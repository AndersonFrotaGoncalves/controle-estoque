<!-- SIDEBAR -->

</div>

<div class="menu">

👤 <span id="usuarioLogado"></span>

<button class="btn-logout" onclick="logout()">
Sair
</button>

</div>

</div>


<!-- CONTEÚDO -->
<div class="main">

<h1>Inventário SAP</h1>

<div class="upload-container">

<h3>Importar Excel do SAP</h3>

<div class="upload-box">

<input type="file" id="excelFile" hidden>

<button class="btn-escolher" onclick="document.getElementById('excelFile').click()">
📂 Escolher Excel
</button>

<span id="nomeArquivo">Nenhum arquivo selecionado</span>

<button class="btn-importar" onclick="importarExcel()">
📥 Importar
</button>

</div>

</div>


<table id="tabelaSAP" class="tabela-produtos">

<thead>
<tr>
<th>Material</th>
<th>Produto</th>
<th>Estoque Sistema</th>
<th>Estoque SAP</th>
<th>Diferença</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

</div>


<!-- SCRIPTS -->
<script src="js/sap.js"></script>
<script src="js/proteger.js"></script>

<script>

let usuario = localStorage.getItem("usuario");

if(usuario){

let dados = JSON.parse(usuario);

document.getElementById("usuarioLogado").innerText = dados.nome || dados.email;

}else{

window.location.href = "login.html";

}

function logout(){

localStorage.removeItem("usuario");

window.location.href = "login.html";

}

</script>
