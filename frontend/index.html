<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos - Controle de Estoque</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="sidebar">

<div class="logo-sidebar">
<img src="img/logo.png" alt="Logo Empresa">
<h2>Delta<br>Estoque</h2>
</div>

<div class="menu">

<a href="dashboard.html">📊 Dashboard</a>
<a href="index.html">📦 Produtos</a>
<a href="mapa.html">🗺️ Mapa</a>
<a href="cadastro.html">➕ Cadastrar</a>
<a href="usuarios.html">👤 Usuários</a>
<a href="importar.html">📥 Importar</a>

</div>

<div class="user-box">

<div class="usuario">
👤 <span id="usuarioLogado"></span>
</div>

<button class="btn-logout" onclick="logout()">
Sair
</button>

</div>

</div>


<div class="main">

<h1>Lista de Produtos</h1>

<table id="tabelaProdutos" class="tabela-produtos">
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Rack</th>
<th>Nível</th>
<th>Qtd</th>
<th>Ações</th>
<button id="btnExcluirSelecionados" onclick="excluirSelecionados()">
🗑 Excluir Selecionados
</button>
</tr>
</thead>

<tbody></tbody>
</table>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalExcluir">
<div class="modal">
<h3>Excluir Produto?</h3>
<p>Esta ação não pode ser desfeita.</p>

<div class="modal-buttons">
<button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
<button class="btn-confirmar" onclick="confirmarExclusao()">Excluir</button>
</div>
</div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
<script src="js/importar.js"></script>
<script src="js/proteger.js"></script>



</body>
</html>
