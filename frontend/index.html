<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Controle de Estoque</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h2>📦 Estoque</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="index.html" class="ativo">Produtos</a>
    <a href="mapa.html">Mapa</a>
    <a href="cadastro.html">Cadastrar</a>

    <div class="user-box">
    <div class="usuario">
        👤 <span id="usuarioLogado"></span>
    </div>

    <button class="btn-logout" onclick="logout()">
        Sair
    </button>
</div>

<div class="main">

    <h1>Lista de Produtos</h1>

    <table id="tabelaProdutos" class="tabela-produtos">
        <thead>
            <tr>
                <th class="col-codigo">Código</th>
                <th class="col-descricao">Descrição</th>
                <th class="col-rack">Rack</th>
                <th class="col-nivel">Nível</th>
                <th class="col-qtd">Qtd</th>
                <th class="col-acoes">Ações</th>
            </tr>
        </thead>

        <tbody></tbody>
    </table>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalExcluir">
    <div class="modal">
        <h3>Excluir Produto?</h3>
        <p>Esta ação não pode ser desfeita.</p>

        <div class="modal-buttons">
            <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            <button class="btn-confirmar" onclick="confirmarExclusao()">Excluir</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- proteção de login -->
<script src="js/proteger.js"></script>

<!-- funções do sistema -->
<script src="js/app.js"></script>

</body>
</html>
