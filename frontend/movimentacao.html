<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movimentação de Estoque</title>



<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/movimentacao.css">

</head>

<body>

<div class="sidebar">

<div class="logo-sidebar">
<img src="img/logo.png" alt="Logo Delta Estoque">
<h2>Delta<br>Estoque</h2>
</div>

<div class="menu">

<a href="dashboard.html">📊 Dashboard</a>

<a href="index.html">📦 Produtos</a>

<a href="cadastro.html">➕ Cadastrar Produto</a>

<a href="movimentacao.html">🔄 Movimentação</a>

<a href="mapa.html">🗺️ Mapa</a>

<a href="importar.html">📥 Importar</a>

<a href="sap.html">📊 Inventário SAP</a>

<a href="usuarios.html">👤 Usuários</a>

</div>

<div class="user-box">

<div class="usuario">
👤 <span id="usuarioLogado"></span>
</div>

<button class="btn-logout" onclick="logout()">
Sair
</button>

</div>

</div>

<div class="main">

<div class="mov-container">

<h1>Movimentação de Estoque</h1>

<div class="form-mov">

<input id="codigo" placeholder="Digite ou escaneie o código">
<button onclick="buscarProduto()">Buscar</button>

<input id="descricao" placeholder="Produto" readonly>
<input type="hidden" id="produto">

<select id="tipo">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">

<input id="obs" placeholder="Observação">

<button onclick="salvarMovimentacao()" class="btn-salvar">
Salvar
</button>
<div id="modalMov">
  <div class="modal-content">

    <h2>Movimentação em Lote</h2>

    <div id="listaItensModal"></div>

    <button onclick="adicionarItemModal()">+ Adicionar Item</button>

    <div class="modal-actions">
        <button onclick="salvarMovimentacaoLote()">💾 Gravar</button>
        <button onclick="fecharModal()">❌ Fechar</button>
    </div>

  </div>
</div>
</div>

<button onclick="abrirModal()">➕ Transderencia em Lote</button>

<h2>Histórico de Movimentações</h2>

<div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">

    <input type="date" id="dataInicio">
    <input type="date" id="dataFim">

    <button onclick="filtrarPorData()">🔍 Filtrar</button>
    <button onclick="limparFiltro()">♻️ Limpar</button>

</div>

<div style="display:flex; gap:10px; margin-bottom:15px;">
   <button onclick="exportarExcel()">📥 Exportar Excel</button>
    <button onclick="imprimir()" class="btn">🖨️ Imprimir</button>
</div>

<table id="tabelaMovimentacoes">
<thead>
<tr>
<th>Produto</th>
<th>Tipo</th>
<th>Observação</th> <!-- 🔥 NOVO -->
<th>Quantidade</th>
<th>Data</th>
<th>Usuário</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</table>

<script src="js/movimentacao.js"></script>
<!-- proteção de login -->
<script src="js/proteger.js"></script>


<div id="modalMov" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);">

  <div style="background:#fff; padding:20px; margin:5% auto; width:500px; border-radius:10px;">

    <h2>Movimentação em Lote</h2>

    <div id="listaItensModal"></div>

    <br>

    <button onclick="adicionarItemModal()">➕ Adicionar Item</button>

    <br><br>

    <button onclick="salvarMovimentacaoLote()">💾 Gravar</button>
    <button onclick="fecharModal()">❌ Fechar</button>

  </div>

</div>
</body>
</html>
