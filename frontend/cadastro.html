<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <h2>📦 Estoque</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="index.html">Produtos</a>
    <a href="mapa.html">Mapa</a>
    <a href="cadastro.html" class="ativo">Cadastrar</a>
    <a href="importar.html">Importar</a>
    
</div>

<div class="main">

    <h1 id="tituloFormulario">Cadastrar Produto</h1>

    <div class="form-container">

        <form id="formProduto">

            <div class="form-grid">

                <div class="form-group">
                    <label>Código</label>
                    <input type="text" id="codigo" required>
                </div>

                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="descricao" required>
                </div>

                <div class="form-group">
                    <label>Rack</label>
                    <input type="text" id="rack" required>
                </div>

                <div class="form-group">
                    <label>Nível</label>
                    <input type="number" id="nivel" required>
                </div>


                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" id="quantidade" required>
                </div>

                <div class="form-group">
                    <label>Quantidade Mínima</label>
                    <input type="number" id="quantidade_minima">
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Salvar Produto</button>
                <a href="index.html" class="btn-secundario">Cancelar</a>
            </div>

        </form>

    </div>

</div>

<script src="js/protect.js"></script>
<script src="js/app.js"></script>
<div id="toast" class="toast"></div>
</body>
</html>
