<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto - Controle de Estoque</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="sidebar">

<div class="logo-sidebar">
<img src="img/logo.png" alt="Logo Empresa">
<h2>Delta<br>Estoque</h2>
</div>

<div class="menu">

<a href="dashboard.html">📊 Dashboard</a>
<a href="index.html">📦 Produtos</a>
<a href="mapa.html">🗺️ Mapa</a>
<a href="cadastro.html">➕ Cadastrar</a>
<a href="usuarios.html">👤 Usuários</a>
<a href="importar.html">📥 Importar</a>

</div>

<div class="user-box">

<div class="usuario">
👤 <span id="usuarioLogado"></span>
</div>

<button class="btn-logout" onclick="logout()">
Sair
</button>

</div>

</div>

<div class="main">

    <h1 id="tituloFormulario">Cadastrar Produto</h1>

    <div class="form-container">

        <form id="formProduto">

            <div class="form-grid">

                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" id="codigo" placeholder="Digite o código do produto" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <input type="text" id="descricao" placeholder="Descrição do produto" required>
                </div>

                <div class="form-group">
                    <label for="rack">Rack</label>
                    <input type="text" id="rack" placeholder="Ex: A01" required>
                </div>

                <div class="form-group">
                    <label for="nivel">Nível</label>
                    <input type="number" id="nivel" placeholder="Ex: 1" required>
                </div>

                <div class="form-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" placeholder="Quantidade em estoque" required>
                </div>

                <div class="form-group">
                    <label for="quantidade_minima">Quantidade Mínima</label>
                    <input type="number" id="quantidade_minima" placeholder="Estoque mínimo">
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Salvar Produto</button>
                <a href="index.html" class="btn-secundario">Cancelar</a>
            </div>

        </form>

    </div>

</div>

<div id="toast" class="toast"></div>

<!-- proteção de login -->
<script src="js/proteger.js"></script>

<!-- funções do sistema -->
<script src="js/app.js"></script>

</body>
</html>
