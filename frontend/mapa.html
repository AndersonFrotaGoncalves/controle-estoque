<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa do Armazém - Controle de Estoque</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h2>📦 Estoque</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="index.html">Produtos</a>
    <a href="mapa.html" class="ativo">Mapa</a>
    <a href="cadastro.html">Cadastrar</a>
</div>

<div class="main">

    <!-- TOPO -->
    <div class="mapa-topo">

        <div class="mapa-titulo">
            <h1>Mapa do Armazém</h1>
            <span>Visualização geral das posições de estoque</span>
        </div>

        <div class="mapa-busca-card">
            <input 
                type="text" 
                id="buscarCodigo" 
                placeholder="Digite o código do produto..."
                onkeydown="if(event.key==='Enter'){buscarProduto();}"
            >

            <button onclick="buscarProduto()">🔍 Buscar</button>
        </div>

    </div>

    <!-- MAPA -->
    <div id="mapa"></div>

</div>

<!-- proteção de login -->
<script src="js/proteger.js"></script>

<!-- funções do sistema -->
<script src="js/app.js"></script>

</body>
</html>
