<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa do Armazém - Controle de Estoque</title>

   <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="sidebar">

<div class="logo-sidebar">
<img src="img/logo.png" alt="Logo Empresa">
<h2>Delta<br>Estoque</h2>
</div>

<div class="menu">

<a href="dashboard.html">📊 Dashboard</a>
<a href="index.html">📦 Produtos</a>
<a href="mapa.html">🗺️ Mapa</a>
<a href="cadastro.html">➕ Cadastrar</a>
<a href="usuarios.html">👤 Usuários</a>
<a href="importar.html">📥 Importar</a>

</div>

<div class="user-box">

<div class="usuario">
👤 <span id="usuarioLogado"></span>
</div>

<button class="btn-logout" onclick="logout()">
Sair
</button>

</div>

</div>
<div class="main">

    <!-- TOPO -->
    <div class="mapa-topo">

        <div class="mapa-titulo">
            <h1>Mapa do Armazém</h1>
            <span>Visualização geral das posições de estoque</span>
        </div>

        <div class="mapa-busca-card">
            <input 
                type="text" 
                id="buscarCodigo" 
                placeholder="Digite o código do produto..."
                onkeydown="if(event.key==='Enter'){buscarProduto();}"
            >

            <button onclick="buscarProduto()">🔍 Buscar</button>
        </div>

    </div>

    <!-- MAPA -->
    <div id="mapa"></div>

</div>

<!-- proteção de login -->
<script src="js/proteger.js"></script>

<!-- funções do sistema -->
<script src="js/app.js"></script>

</body>
</html>
