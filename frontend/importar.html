<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Importar Produtos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
    <h2>📦 Estoque</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="index.html">Produtos</a>
    <a href="mapa.html">Mapa</a>
    <a href="cadastro.html">Cadastrar</a>
    <a href="importar.html" class="ativo">Importar</a>
    
</div>

<div class="main">

    <h1>Importar Produtos via Excel</h1>

    <div class="form-container">

        <form id="formImportar">
            <div class="form-group">
                <label>Selecionar arquivo Excel (.xlsx)</label>
                <input type="file" id="arquivo" accept=".xlsx" required>
            </div>

            <button type="submit">Importar Produtos</button>
        </form>

    </div>

</div>

<script>
document.getElementById("formImportar").addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData();
    formData.append("arquivo", document.getElementById("arquivo").files[0]);

   fetch("/importar", {
    method: "POST",
    body: formData
})
.then(res => res.json())
.then(data => {
    alert(data.message);
})
.catch(err => {
    alert("Erro na importação");
});

});
</script>
<script src="js/protect.js"></script>
<script src="js/app.js"></script>
</body>
</html>
