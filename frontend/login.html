<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controle de Estoque</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f6f9;">

<div class="form-container" style="max-width:400px;width:100%;">
    
    <h2 style="margin-bottom:20px;text-align:center;">Login</h2>

    <form id="loginForm">

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite seu email" required>
        </div>

        <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required>
        </div>

        <div style="margin-top:20px;">
            <button type="submit" class="btn-editar" style="width:100%;">Entrar</button>
        </div>

    </form>

    <p id="erroLogin" style="color:red;margin-top:10px;text-align:center;"></p>

</div>

<script src="js/auth.js"></script>

</body>
</html>
