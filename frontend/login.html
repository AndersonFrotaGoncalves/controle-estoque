<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:#f4f6f9;">

<div class="form-container" style="max-width:400px;width:100%;">
    <h2 style="margin-bottom:20px;text-align:center;">Login</h2>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email">
    </div>

    <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha">
    </div>

    <div style="margin-top:20px;">
        <button onclick="login()" class="btn-editar" style="width:100%;">Entrar</button>
    </div>

    <p id="erroLogin" style="color:red;margin-top:10px;text-align:center;"></p>
</div>


</body>
<script src="js/auth.js"></script>
</html>
